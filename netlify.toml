# BEDROCK — Netlify configuration
[build]
  publish = "."
  command = ""

# service worker must never be cached stale, and must serve as JS
[[headers]]
  for = "/app/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/app/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Aegis Air PWA
[[headers]]
  for = "/aegis-air-mvp/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/aegis-air-mvp/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"


# sensible security headers (no strict CSP: the app loads CDN + fonts + inline)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # geolocation allowed on same origin for the Aegis Air "use my location" feature
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"

[[redirects]]
  from = "/app"
  to = "/app/"
  status = 301

# /aegis now serves the cinematic landing page (committed build in /aegis/),
# whose CTAs funnel into the instrument app at /aegis-air-mvp/.

[[redirects]]
  from = "/aegis-air-mvp"
  to = "/aegis-air-mvp/"
  status = 301
