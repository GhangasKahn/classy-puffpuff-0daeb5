# BEDROCK — Netlify configuration
[build]
  publish = "."
  command = ""

# service worker must never be cached stale, and must serve as JS
[[headers]]
  for = "/app/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/app/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Aegis Air PWA
[[headers]]
  for = "/aegis-air-mvp/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/aegis-air-mvp/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"


# sensible security headers (no strict CSP: the app loads CDN + fonts + inline)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # geolocation allowed on same origin for the Aegis Air "use my location" feature
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"

[[redirects]]
  from = "/app"
  to = "/app/"
  status = 301

[[redirects]]
  from = "/aegis"
  to = "/aegis-air-mvp/"
  status = 301

[[redirects]]
  from = "/aegis-air-mvp"
  to = "/aegis-air-mvp/"
  status = 301

# ---- fence design suite (HASHIRA / STELE / report) ----
[[redirects]]
  from = "/fence"
  to = "/fence/"
  status = 301

[[redirects]]
  from = "/stele"
  to = "/fence/stele/"
  status = 301

[[redirects]]
  from = "/report"
  to = "/fence/report/"
  status = 301

# CAD downloads: force download with correct types
[[headers]]
  for = "/fence/*/exports/*"
  [headers.values]
    Content-Disposition = "attachment"

[[headers]]
  for = "/*.FCStd"
  [headers.values]
    Content-Type = "application/zip"
    Content-Disposition = "attachment"

[[headers]]
  for = "/*.step"
  [headers.values]
    Content-Type = "application/step"
    Content-Disposition = "attachment"

[[headers]]
  for = "/*.stl"
  [headers.values]
    Content-Type = "model/stl"

[[headers]]
  for = "/*.scad"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# plan sheets render inline as SVG
[[headers]]
  for = "/fence/stele/plans/*"
  [headers.values]
    Content-Type = "image/svg+xml"
