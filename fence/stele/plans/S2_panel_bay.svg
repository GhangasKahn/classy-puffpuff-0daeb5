fill='#8a6f4d' text-anchor='start'>250</text><text x='1150.0' y='240.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>RAILS: 38x89 [2x4] CEDAR ON EDGE,</text><text x='1150.0' y='266.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  SET 60 [2.4"] INTO PIER POCKETS</text><text x='1150.0' y='292.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  (HASHIRA NUKI — THROUGH-RAIL).</text><text x='1150.0' y='318.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  WEDGE-LOCK, NO FACE SCREWS.</text><text x='1150.0' y='344.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>BOARDS: 19x140 [1x6] VERTICAL,</text><text x='1150.0' y='370.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  10 GAP — RAIN-SCREEN AIRFLOW,</text><text x='1150.0' y='396.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  FASTEN TO RAILS ONLY, SS RING</text><text x='1150.0' y='422.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  SHANK NAILS 2 PER CROSSING.</text><text x='1150.0' y='448.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>CAP: 45x120 CEDAR, 8 DEG WASH,</text><text x='1150.0' y='474.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  DRIP KERF BOTH EDGES.</text><text x='1150.0' y='500.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>CURB: CAST CONC OR SOLID CMU,</text><text x='1150.0' y='526.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  KEEPS BOARDS CLEAR OF SNOW,</text><text x='1150.0' y='552.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>  SPLASH + PLOW BERM.</text><text x='1150.0' y='620.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='18' fill='#26241f' text-anchor='start' font-weight='600'>RAIL POCKET DETAIL — 1:5</text><rect x='1180.0' y='660.0' width='96.0' height='160.0' fill='none' stroke='#26241f' stroke-width='2'/><rect x='1228.0' y='692.0' width='160.0' height='76.0' fill='none' stroke='#a34e2b' stroke-width='1.6' stroke-dasharray='8 4'/><rect x='1232.8' y='694.4' width='208.0' height='71.2' fill='none' stroke='#26241f' stroke-width='2'/><text x='1310.0' y='686.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='14' fill='#a34e2b' text-anchor='start'>POCKET 44x95, 60 DEEP</text><text x='1330.0' y='765.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='14' fill='#8a6f4d' text-anchor='start'>38x89 RAIL + HW WEDGE</text><text x='1188.0' y='850.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='14' fill='#8a6f4d' text-anchor='start'>SLOPE POCKET FLOOR 5 DEG OUT — DRAIN</text><rect x='30' y='1062' width='1620' height='96' fill='#f6f3ea' stroke='#26241f' stroke-width='3'/><line x1='1120' y1='1062' x2='1120' y2='1158' stroke='#26241f' stroke-width='2'/><line x1='1420' y1='1062' x2='1420' y2='1158' stroke='#26241f' stroke-width='2'/><text x='54' y='1100' font-family='Georgia, serif' font-size='30' fill='#26241f' font-weight='600'>STELE — masonry &amp; timber fence</text><text x='54' y='1134' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#8a6f4d'>BUFFALO NY · FROST 48in · SNOW 40psf GROUND · WIND 115mph ULT · FREEZE-THAW SEVERE</text><text x='1144' y='1100' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f'>PANEL BAY — ELEVATION + RAIL SECTION</text><text x='1144' y='1132' font-family='IBM Plex Mono, Menlo, monospace' font-size='15' fill='#8a6f4d'>1:20 · mm [in]</text><text x='1444' y='1104' font-family='IBM Plex Mono, Menlo, monos