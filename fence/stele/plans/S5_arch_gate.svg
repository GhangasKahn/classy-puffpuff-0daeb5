no, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   7 DAYS MIN.</text><text x='1150.0' y='396.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>3. ARCH BEARS ON IMPOSTS ONLY —</text><text x='1150.0' y='422.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   PURE COMPRESSION. NO STEEL</text><text x='1150.0' y='448.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   NEEDED; SS DOWELS AT IMPOSTS</text><text x='1150.0' y='474.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   FOR ERECTION ONLY.</text><text x='1150.0' y='500.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>4. CROWN 2640 — CHECK BUFFALO</text><text x='1150.0' y='526.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   GATE/ARBOR HEIGHT ALLOWANCE.</text><text x='1150.0' y='552.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>5. HINGES: SS BALL-BEARING, M12</text><text x='1150.0' y='578.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   EPOXY ANCHORS INTO PIER — 100</text><text x='1150.0' y='604.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   EDGE DIST MIN.</text><text x='1150.0' y='630.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>6. LEAF SWINGS INWARD, CLEAR OF</text><text x='1150.0' y='656.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   SNOW BERM AT THRESHOLD.</text><rect x='30' y='1062' width='1620' height='96' fill='#f6f3ea' stroke='#26241f' stroke-width='3'/><line x1='1120' y1='1062' x2='1120' y2='1158' stroke='#26241f' stroke-w