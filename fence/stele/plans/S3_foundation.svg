='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   WATER AWAY FROM BEARING PLANE</text><text x='1130.0' y='370.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   (ROMAN RULE: NEVER LET THE BASE</text><text x='1130.0' y='396.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   SIT WET).</text><text x='1130.0' y='422.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>3. POUR FTG + STEM MONOLITHIC WHERE</text><text x='1130.0' y='448.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   POSSIBLE. 4000 PSI AIR-ENTRAINED.</text><text x='1130.0' y='474.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>4. DAMP-PROOF STEM TOP 150; BREAK</text><text x='1130.0' y='500.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   BOND W/ PLINTH USING FLASHING —</text><text x='1130.0' y='526.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   CAPILLARY CUT.</text><text x='1130.0' y='552.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>5. BACKFILL FREE-DRAINING GRAVEL,</text><text x='1130.0' y='578.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   SLOPE GRADE AWAY 5%.</text><text x='1130.0' y='604.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>6. CURB BETWEEN PIERS: 200x250,</text><text x='1130.0' y='630.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   THICKENED EDGE 300 DEEP, (2) #4</text><text x='1130.0' y='656.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   CONT — FLOATS INDEPENDENT OF</text><text x='1130.0' y='682.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f' text-anchor='start'>   PIER FTGS (HEAVE ISOLATION).</text><rect x='30' y='1062' width='1620' height='96' fill='#f6f3ea' stroke='#26241f' stroke-width='3'/><line x1='1120' y1='1062' x2='1120' y2='1158' stroke='#26241f' stroke-width='2'/><line x1='1420' y1='1062' x2='1420' y2='1158' stroke='#26241f' stroke-width='2'/><text x='54' y='1100' font-family='Georgia, serif' font-size='30' fill='#26241f' font-weight='600'>STELE — masonry &amp; timber fence</text><text x='54' y='1134' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#8a6f4d'>BUFFALO NY · FROST 48in · SNOW 40psf GROUND · WIND 115mph ULT · FREEZE-THAW SEVERE</text><text x='1144' y='1100' font-family='IBM Plex Mono, Menlo, monospace' font-size='17' fill='#26241f'>PIER FOUNDATION — SECTION</text><text x='1144' y='1132' font-family='IBM Plex Mono, Menlo, monospace' font-size='15' fill='#8a6f4d'>1:15 · mm [in]</text><text x='1444' y='1104' font-family='IBM Plex Mono, Menlo, monospace' font-size='26' fill='#a34e2b' font-weight='600'>S-3</text><text x='1444' y='1134' font-family='IBM Plex Mono, Menlo, monospace' font-size='16' fill='#8a6f4d'>SHEET 3 OF 5</text></svg>