<text x='780.0' y='70.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='12' fill='#1a1f24' text-anchor='start'>DESIGN: Prairie horizontals (Darwin Martin / FLW) + Japanese nuki / hozo / kama-tsugi.</text>
<text x='780.0' y='92.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='12' fill='#1a1f24' text-anchor='start'>JOINERY: No nails or screws in timber. Wedge-locked through-rails. Drawbored gate M&amp;T.</text>
<text x='780.0' y='114.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='12' fill='#1a1f24' text-anchor='start'>WINTER: Knock wedges → withdraw nuki rails → lift gate off pintles → lift posts → tip piers.</text>
<text x='780.0' y='136.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='12' fill='#1a1f24' text-anchor='start'>FINISH: Exterior primer + owner gray. Mask wedge faces, tenons, and sleeve contact.</text>
<text x='780.0' y='158.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='12' fill='#1a1f24' text-anchor='start'>ENGINEERING NOTE: Planning design — have a NY PE review foundations if required by permit.</text>
