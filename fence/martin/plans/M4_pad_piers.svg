<text x='800.0' y='347.6' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>PAD: 155" × 28" × 6" (+ 5" makeup)</text>
<text x='780.0' y='420.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='16' fill='#3d5a4c' text-anchor='start' font-weight='600'>WINTER REMOVAL SEQUENCE</text>
<text x='780.0' y='455.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>1. Open gate · remove oak latch peg / padlock.</text>
<text x='780.0' y='479.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>2. Knock out rail wedges (kusabi) — save in labeled bag.</text>
<text x='780.0' y='503.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>3. Slide nuki rails out of posts (two-person).</text>
<text x='780.0' y='527.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>4. Lift vertical boards out of grooves; bundle flat.</text>
<text x='780.0' y='551.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>5. Lift gate leaf off wooden pintles.</text>
<text x='780.0' y='575.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>6. Lift each post straight up out of sleeve.</text>
<text x='780.0' y='599.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>7. Tip socket piers onto dolly; store dry.</text>
<text x='780.0' y='623.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>8. Leave leveling pad in place (or cover); mark sleeve holes.</text>
<text x='40.0' y='900.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='14' fill='#3d5a4c' text-anchor='start' font-weight='600'>NOTES</text>
<text x='40.0' y='928.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>• Field-measure driveway→garden drop; adjust makeup thickness. Default shown: 5".</text>
<text x='40.0' y='952.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>• Sleeve: Schedule 40 PVC or galv. tube sized to 2.5"×4.5" tenon + ¼" clearance; drill ⌀½" drain at bottom.</text>
<text x='40.0' y='976.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>• Concrete: 4000 psi air-entrained. Piers may be precast for true tip-out removal.</text>
<text x='40.0' y='1000.0' font-family='IBM Plex Mono, Menlo, monospace' font-size='13' fill='#1a1f24' text-anchor='start'>• For permanent frost piers instead: extend stems to 48" bearing — see STELE report method.</text>
</svg>
