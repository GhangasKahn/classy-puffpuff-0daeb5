# BEDROCK Backend — Cloudflare Worker
# Fill in database_id + kv id after: wrangler d1 create bedrock / wrangler kv namespace create SESS
# Set secrets: SESSION_SECRET, KEK_B64 (see README.md)
name = "bedrock-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Zero logging — PRIVACY.md / ZERO-KNOWLEDGE-DOCTRINE.md law #2
[observability]
enabled = false

[vars]
# Relying Party ID = the domain serving the PWA (no scheme, no path)
RP_ID = "localhost"
# Exact origins allowed to talk to this API (comma-separated)
APP_ORIGINS = "http://localhost:8787,http://localhost:5173,http://127.0.0.1:8787,http://localhost:8888"
RP_NAME = "BEDROCK"

[[d1_databases]]
binding = "DB"
database_name = "bedrock"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SESS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Purge expired sealed inbox rows daily (no activity logging)
[triggers]
crons = ["17 6 * * *"]
