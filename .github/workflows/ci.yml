name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  site-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required site assets
        run: |
          test -f site/index.html
          test -f site/app/index.html
          test -f site/app/bedrock-api.js
          test -f site/app/quant-engine.js
          test -f site/app/hermes-agents.js
          test -f site/app/service-worker.js
          test -f site/app/manifest.json
          test -f site/app/icon-192.png
          test -f site/app/icon-512.png
          test -f docs/BEDROCK-Backend-Architecture.md
          test -f docs/BEDROCK-Site-Deploy-and-Activate.md
          test -f docs/ATELIER-generative-web-design-protocol.md
          test -f docs/QUANT-GOD-TIER.md
          test -f docs/HERMES-AGENTS.md
          test -f docs/VISUAL-SYSTEM.md
          test -f site/brand/bedrock-system.css
          # Client SDK must expose production surface
          grep -q "pushVault" site/app/bedrock-api.js
          grep -q "REGISTER PASSKEY" site/app/index.html
          grep -q "BedrockQuant" site/app/quant-engine.js
          grep -q "BedrockHermes" site/app/hermes-agents.js
          grep -q "opportunityCostEngine" site/app/hermes-agents.js
          grep -q "hermes-agents.js" site/app/index.html
          grep -q "QUANT LAB" site/app/index.html
          grep -q "UNRELIABLE LEDGER" site/index.html
          grep -q "Archivo Black" site/brand/bedrock-system.css
          grep -q "icon-192.png" site/app/manifest.json
