function readUsage() {
  let u = {}; try { u = JSON.parse(localStorage.getItem("bd_usage")) || {}; } catch (e) { }
  const day = new Date().toISOString().slice(0, 10), mon = day.slice(0, 7);
  if (u.day !== day) { u.day = day; u.daySpent = 0; }
  if (u.mon !== mon) { u.mon = mon; u.monSpent = 0; }
  u.daySpent = u.daySpent || 0; u.monSpent = u.monSpent || 0; u.calls = u.calls || 0;
  return u;
}
function logUsage(cost) {
  const u = readUsage(); u.daySpent += cost; u.monSpent += cost; u.calls += 1;
  try { localStorage.setItem("bd_usage", JSON.stringify(u)); } catch (e) { }
}
async function callLLM(system, messages, maxTokens) {
  let c = {}; try { c = JSON.parse(localStorage.getItem("bd_ai")) || {}; } catch (e) { }
  if (!c.url || !c.model) return "// AI is not configured. open Config → AI ENGINE, choose a provider, set a model and your key. every number and tool works without this.";
  const u = readUsage();
  if (c.dayCap && u.daySpent >= c.dayCap) return "// daily spend cap reached. it resets tomorrow, or raise it in Config → Spend Governor.";
  if (c.monCap && u.monSpent >= c.monCap) return "// monthly spend cap reached. raise it in Config if you must.";
  try {
    const headers = { "Content-Type": "application/json" };
    if (c.key) headers["Authorization"] = "Bearer " + c.key;
    headers["HTTP-Referer"] = "https://bedrock.local"; headers["X-Title"] = "BEDROCK";
    const res = await fetch(c.url, { method: "POST", headers, body: JSON.stringify({ model: c.model, max_tokens: maxTokens || 1000, messages: [{ role: "system", content: system }].concat(messages || []) }) });
    const data = await res.json();
    if (data.error) return "// provider error: " + (data.error.message || JSON.stringify(data.error));
    const tok = (data.usage && (data.usage.total_tokens || ((data.usage.prompt_tokens || 0) + (data.usage.completion_tokens || 0)))) || 0;
    logUsage(tok * (c.rate || 0) / 1e6);
    const m = data.choices && data.choices[0] && data.choices[0].message;
    const out = m && m.content;
    if (!out) return "// the provider returned an empty response.";
    return typeof out === "string" ? out : (Array.isArray(out) ? out.map(x => (x && x.text) || "").join("") : JSON.stringify(out));
  } catch (e) {
    return "// could not reach the provider — often a browser CORS block. OpenRouter works directly; others may need the proxy. the math still works regardless.";
  }
}

// ---- inline SVG charts (replaces recharts) ----
function CashBars({ data }) {
  const W = 340, H = 150, base = H - 16, top = 8, d = data || [];
  const n = d.length || 1, max = Math.max(1, ...d.flatMap(x => [x.inc || 0, x.exp || 0]));
  const gw = W / n, bw = Math.max(4, gw / 2 - 4), y = v => base - (v / max) * (base - top);
  return (
    <svg viewBox={"0 0 " + W + " " + H} width="100%" height={H} preserveAspectRatio="none" style={{ display: "block", fontFamily: "monospace" }}>
      {d.map((x, i) => { const cx = i * gw + gw / 2; return (
        <g key={i}>
          <rect x={cx - bw - 1} y={y(x.inc || 0)} width={bw} height={base - y(x.inc || 0)} fill="#46E0A0" />
          <rect x={cx + 1} y={y(x.exp || 0)} width={bw} height={base - y(x.exp || 0)} fill="#FF4D14" />
          <text x={cx} y={H - 3} fill="#8C8C8C" fontSize="9" textAnchor="middle">{x.m}</text>
        </g>); })}
    </svg>
  );
}
function FanChart({ data }) {
  const W = 340, H = 210, pt = 12, pb = 16, pl = 4, pr = 4, d = data || [];
  if (!d.length) return <svg viewBox={"0 0 " + W + " " + H} width="100%" height={H} />;
  const xs = d.map((p, i) => pl + (i / Math.max(1, d.length - 1)) * (W - pl - pr));
  const all = d.flatMap(p => [p.p5, p.p50, p.p95]), mn = Math.min(...all), mx = Math.max(...all, mn + 1);
  const y = v => (H - pb) - ((v - mn) / (mx - mn)) * (H - pt - pb);
  const ln = key => d.map((p, i) => (i ? "L" : "M") + xs[i].toFixed(1) + " " + y(p[key]).toFixed(1)).join(" ");
  const area = "M" + xs[0].toFixed(1) + " " + y(d[0].p95).toFixed(1) + " " + d.map((p, i) => "L" + xs[i].toFixed(1) + " " + y(p.p95).toFixed(1)).join(" ") + " L" + xs[xs.length - 1].toFixed(1) + " " + (H - pb) + " L" + xs[0].toFixed(1) + " " + (H - pb) + " Z";
  return (
    <svg viewBox={"0 0 " + W + " " + H} width="100%" height={H} preserveAspectRatio="none" style={{ display: "block" }}>
      <path d={area} fill="#FF4D14" fillOpacity="0.12" stroke="none" />
      <path d={ln("p95")} fill="none" stroke="#3A86FF" strokeWidth="1.3" />
      <path d={ln("p5")} fill="none" stroke="#FFB000" strokeWidth="1.3" strokeDasharray="4 3" />
      <path d={ln("p50")} fill="none" stroke="#FF4D14" strokeWidth="2.2" />
    </svg>
  );
}
function Donut({ data, colors }) {
  const d = data || [], C = 2 * Math.PI * 41, tot = d.reduce((s, x) => s + (x.v || 0), 0) || 1; let acc = 0;
  return (
    <svg viewBox="0 0 110 110" width="110" height="110" style={{ flexShrink: 0 }}>
      <g transform="rotate(-90 55 55)">
        {d.map((x, i) => { const len = ((x.v || 0) / tot) * C; const seg = <circle key={i} cx="55" cy="55" r="41" fill="none" stroke={colors[i % colors.length]} strokeWidth="22" strokeDasharray={len.toFixed(2) + " " + (C - len).toFixed(2)} strokeDashoffset={(-acc).toFixed(2)} />; acc += len; return seg; })}
      </g>
    </svg>
  );
}

// Adaptive lifecycle: the system reads the user's real state and picks the regime + persona. The user does not choose.
const REGIMES = {
  SURVIVAL: { persona: "BEEKEEPER", posture: "triage mode — stabilize the floor and kill high-interest debt before anything else." },
  FOUNDATION: { persona: "ACCOUNTANT", posture: "build the buffer, cut the leaks, then begin deploying. defense before offense." },

  PRESERVE: { persona: "ORACLE", posture: "maintenance mode — the game is no longer getting rich, it is staying rich." },
};
function regimeOf(D, settings) {
  const ef = settings && settings.efMonths ? settings.efMonths : 3;
  const runway = D.runway, liab = D.liab || 0, nw = D.nw || 0, assets = D.assets || 0;
  let stage;
  if (liab > assets * 0.5 || (runway != null && runway < 1)) stage = "SURVIVAL";
  else if ((runway != null && runway < ef) || nw < 25000) stage = "FOUNDATION";
  else if (nw < 250000) stage = "ACCUMULATE";
  else if (nw < 1000000) stage = "SCALE";
  else stage = "PRESERVE";
  const directive = {
    SURVIVAL: "The user is in SURVIVAL mode (debt-heavy or below their emergency floor). Focus relentlessly on triage: a small starter buffer, attacking the highest-APR debt, stopping the bleeding. Do not discuss aggressive investing yet — stabilization is the only priority.",
    FOUNDATION: "The user is in FOUNDATION mode (floor not yet built or small net worth). Priority: finish the emergency fund, clear high-interest debt, then begin steady low-cost deployment. Defense before offense.",
    ACCUMULATE: "The user is in ACCUMULATE mode (floor set, growing). Priority: bounded-aggressive compounding — disciplined contributions, position sizing for survival, owning productive assets, raising income.",
    SCALE: "The user is in SCALE mode (substantial capital). Priority: diversification, managing concentration risk, tax-aware structuring with professionals, protecting accumulated gains while still growing.",
    PRESERVE: "The user is in PRESERVE mode (wealthy). Priority: capital preservation, drawdown control, not chasing returns, not risking what is already built. The goal is staying rich, not getting rich.",
  }[stage];
  return { stage, persona: REGIMES[stage].persona, posture: REGIMES[stage].posture, directive };
}
const fmt = (n) => (n == null || !isFinite(n)) ? "—" : (n < 0 ? "-$" : "$") + Math.abs(Math.round(n)).toLocaleString();
const fmtk = (n) => {
  if (n == null || !isFinite(n)) return "—";
  const a = Math.abs(n); const s = n < 0 ? "-" : "";
  if (a >= 1e6) return s + "$" + (a / 1e6).toFixed(a >= 1e7 ? 0 : 1) + "M";
  if (a >= 1e3) return s + "$" + (a / 1e3).toFixed(a >= 1e5 ? 0 : 1) + "k";
  return s + "$" + Math.round(a);
};
const pctf = (n) => (n == null || !isFinite(n)) ? "—" : (n * 100).toFixed(1) + "%";
const gauss = () => { let u = 0, v = 0; while (u === 0) u = Math.random(); while (v === 0) v = Math.random(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); };
// Student-t shock: normal / sqrt(chi-square_df / df). Low df => fat tails (modeled crashes).
const tShock = (df) => { let s = 0; for (let i = 0; i < df; i++) { const z = gauss(); s += z * z; } return gauss() / Math.sqrt(s / df); };

function rankOf(nw) {
  let i = 0; for (let k = 0; k < RANKS.length; k++) if (nw >= RANKS[k].min) i = k;
  const cur = RANKS[i], next = RANKS[i + 1];
  const xp = next ? Math.max(0, Math.min(1, (nw - cur.min) / (next.min - cur.min))) : 1;
  return { i, name: cur.name, lvl: i + 1, xp, next, toNext: next ? next.min - nw : 0 };
}
function goalCalc(g, P0, c, r) {
  const rm = Math.pow(1 + r, 1 / 12) - 1;
  const now = new Date(); const ty = now.getFullYear(), tm = now.getMonth() + 1;
  const n = Math.max(0, (g.year - ty) * 12 + (12 - tm));
  let projected, reqMo, reached;
  if (rm === 0) { projected = P0 + c * n; reqMo = Math.max(0, (g.cost - P0) / Math.max(n, 1)); reached = P0 >= g.cost ? ty : ty + (g.cost - P0) / Math.max(c * 12, 1); }
  else {
    const grow = Math.pow(1 + rm, n);
    projected = P0 * grow + c * (grow - 1) / rm;
    reqMo = grow > 1 ? Math.max(0, (g.cost - P0 * grow) * rm / (grow - 1)) : 0;
    if (P0 >= g.cost) reached = ty;
    else { const ratio = (g.cost + c / rm) / (P0 + c / rm); reached = ratio > 0 ? ty + (tm - 1) / 12 + Math.log(ratio) / Math.log(1 + rm) / 12 : null; }
  }
  const onPlan = projected >= g.cost;
  const verdict = onPlan ? "ON PLAN" : reqMo <= c * 1.5 ? "RAISE A BIT" : reqMo <= c * 4 ? "BIG STRETCH" : "JACKPOT ODDS";
  const fund = Math.max(0, Math.min(1, P0 / g.cost));
  return { n, projected, reqMo, reached, onPlan, verdict, fund, years: n / 12 };
}
function monteCarlo(P0, c, r, vol, months, sims, goal, df) {
  const sm = vol / Math.sqrt(12); const drift = Math.log(1 + r) / 12 - 0.5 * sm * sm;
  const tsc = df > 2 ? Math.sqrt((df - 2) / df) : 1;   // rescale t to keep target variance
  const cols = Array.from({ length: months }, () => []);
  const terminals = [], maxDDs = [], uw = [];
  for (let s = 0; s < sims; s++) {
    let w = P0, peak = P0, mdd = 0, under = 0;
    for (let m = 0; m < months; m++) {
      const shock = (df && df > 0) ? tShock(df) * tsc : gauss();   // fat-tailed when df set
      w = w * Math.exp(drift + sm * shock) + c;
      if (w > peak) peak = w;
      const dd = peak > 0 ? (peak - w) / peak : 0;
      if (dd > mdd) mdd = dd;
      if (w < peak) under++;
      cols[m].push(w);
    }
    terminals.push(w); maxDDs.push(mdd); uw.push(under / months);
  }
  const pc = (arr, p) => { const a = [...arr].sort((x, y) => x - y); return a[Math.min(a.length - 1, Math.floor(p * (a.length - 1)))]; };
  const step = Math.max(1, Math.round(months / 60));
  const fan = []; for (let m = 0; m < months; m += step) fan.push({ m: m + 1, yr: ((m + 1) / 12).toFixed(1), p5: pc(cols[m], .05), p50: pc(cols[m], .5), p95: pc(cols[m], .95) });
  if (fan[fan.length - 1].m !== months) { const m = months - 1; fan.push({ m: months, yr: (months / 12).toFixed(1), p5: pc(cols[m], .05), p50: pc(cols[m], .5), p95: pc(cols[m], .95) }); }
  const p5 = pc(terminals, .05), p50 = pc(terminals, .5), p95 = pc(terminals, .95);
  const frac = (arr, th) => arr.filter(x => x >= th).length / arr.length;
  const asym = (p50 - p5) > 0 ? (p95 - p50) / (p50 - p5) : null;
  return {
    fan, p5, p50, p95, mean: terminals.reduce((a, b) => a + b, 0) / sims,
    prob: goal > 0 ? terminals.filter(t => t >= goal).length / sims : null,
    dd50: frac(maxDDs, .5), dd70: frac(maxDDs, .7), dd90: frac(maxDDs, .9),

  };
}

const _b64 = (buf) => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
const _unb64 = (str) => Uint8Array.from(atob(str), c => c.charCodeAt(0));
async function _deriveKey(pass, salt, iters) {
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: iters, hash: "SHA-256" }, base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
}
async function encryptVault(pass, obj) {
  // Prefer production client (600k PBKDF2 + pad buckets); fall back for older sessions
  if (window.BedrockAPI && window.BedrockAPI.encryptPayload) {
    return window.BedrockAPI.encryptPayload(pass, obj);
  }
  const iters = 600000;
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await _deriveKey(pass, salt, iters);
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { app: "BEDROCK", v: 2, alg: "AES-256-GCM", kdf: "PBKDF2-SHA256", iters, salt: _b64(salt), iv: _b64(iv), ct: _b64(ct) };
}
async function decryptVault(pass, blob) {
  if (window.BedrockAPI && window.BedrockAPI.decryptPayload) {
    return window.BedrockAPI.decryptPayload(pass, blob);
  }
  const key = await _deriveKey(pass, _unb64(blob.salt), blob.iters || 600000);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: _unb64(blob.iv) }, key, _unb64(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

const FREQUENCIES = [
  { key: "weekly", label: "Weekly", perYear: 52 },

function toMonthly(amount, freqKey) {
  const f = FREQUENCIES.find(x => x.key === freqKey) || FREQUENCIES[3];

  const f = FREQUENCIES.find(x => x.key === freqKey) || FREQUENCIES[3];
  return (monthly || 0) * (12 / f.perYear);
}

/* ============================ BTC CYCLE GAUGE ============================ */
function BTCGauge() {
  const last = new Date("2024-04-19"), next = new Date("2028-04-17"), now = new Date();
  const days = Math.floor((now - last) / 864e5);
  const cycle = Math.max(0, Math.min(1, (now - last) / (next - last)));
  const toNext = Math.ceil((next - now) / 864e5);
  const phase = cycle < .25 ? "POST-HALVING / ACCUMULATION" : cycle < .5 ? "MARKUP / EARLY BULL" : cycle < .7 ? "EUPHORIA RISK ZONE" : cycle < .85 ? "DISTRIBUTION RISK" : "LATE CYCLE / CAUTION";
  const risk = cycle < .25 ? "LOW" : cycle < .5 ? "RISING" : cycle < .7 ? "ELEVATED" : "HIGH";
  const rc = risk === "LOW" ? "var(--ok)" : risk === "RISING" ? "var(--warn)" : "var(--acc2)";
  return (
    <div className="card" style={{ padding: 14, marginTop: 8 }}>
      <Ticks />
      <div className="row"><div className="lbl">BTC CYCLE GAUGE</div><span className="chip" style={{ color: rc, borderColor: "currentColor" }}>{risk} RISK</span></div>
      <div className="big" style={{ fontSize: 17, marginTop: 8 }}>{phase}</div>
      <div style={{ height: 8, background: "var(--bg)", border: "1px solid var(--line)", marginTop: 10 }}><div style={{ height: "100%", width: (cycle * 100) + "%", background: rc, transition: ".6s" }} /></div>
      <div className="row" style={{ marginTop: 8 }}><div className="lbl mono-tab">{days}D SINCE HALVING</div><div className="lbl mono-tab">{(cycle * 100).toFixed(0)}% THROUGH CYCLE</div></div>
      <div className="lbl" style={{ marginTop: 6 }}>NEXT HALVING ≈ APR 2028 · {toNext}D OUT · US ELECTION NOV 2028</div>
      <div style={{ fontSize: 10, color: "var(--faint)", marginTop: 8, lineHeight: 1.5 }}>// the 4-year rhythm is a pattern, not a promise — returns diminish each cycle. size for the floor, not the moon.</div>
    </div>
  );
}

/* ============================ PURCHASE TRIBUNAL ============================ */
function PurchaseAdvisor({ settings, D }) {
  const [item, setItem] = useState({ name: "", cost: "", kind: "Depreciating" });
  const [out, setOut] = useState(null);
  const [busy, setBusy] = useState(false);
  const r = settings.ret, c = (D && D.effContrib != null ? D.effContrib : settings.contribution) || 1;
  const calc = useMemo(() => {
    const cost = +item.cost || 0;
    const fv = (t) => cost * Math.pow(1 + r, t);
    return { cost, months: cost / c, fv10: fv(10), fv20: fv(20) };
  }, [item.cost, r, c]);
  const run = async () => {
    if (!calc.cost || busy) return;
    setBusy(true); setOut({ verdict: "…", body: "" });
    const ctx = `The user wants to buy "${item.name || "this item"}" for $${calc.cost}, classified as a ${item.kind} asset. Their reality: net worth ${fmt(D.nw)}, cash ${fmt(D.assets)}, monthly investable surplus ${fmt(settings.contribution)}, expected market return ${(r * 100).toFixed(0)}%/yr. Opportunity cost: that money invested instead becomes about ${fmt(calc.fv10)} in 10 years and ${fmt(calc.fv20)} in 20. The sticker equals ${calc.months.toFixed(1)} months of their entire investable surplus.`;
    const system = `You are THE ACCOUNTANT — a cold, exacting purchase-vetting engine inside a finance app. The user brings you something they want to buy; you rule on whether it is financially defensible. Voice: clinical, precise, unsentimental, faintly menacing in your refusal to flatter — like the accountant in the film. Be HARD on the math and the choice, never contemptuous of the person. Weigh opportunity cost honestly; separate appreciating or income-producing assets from depreciating consumption; concede when a purchase is worth it for pure utility even if it is not ROI-positive, but say so plainly; protect their emergency floor absolutely and never bless a buy that eats safety-net cash; never endorse debt or leverage to fund consumption. Begin with a one-line verdict in caps — ACQUIRE, NOT WORTH IT, or WAIT — then 3 to 5 tight sentences tied to the real numbers, then one closing line that this is analysis, not financial advice. Under 130 words. ${ctx}`;
    try {
      const text = await callLLM(system, [{ role: "user", content: `Vet this purchase: ${item.name || "item"} at $${calc.cost}.` }], 1000);
      const head = (text.split("\n")[0] || "").toUpperCase();
      const verdict = head.includes("ACQUIRE") ? "ACQUIRE" : head.includes("NOT WORTH") ? "NOT WORTH IT" : head.includes("WAIT") ? "WAIT" : "THE RULING";
      setOut({ verdict, body: text });
    } catch (e) {
      setOut({ verdict: "OFFLINE", body: "// no connection — but the math stands. this costs you " + fmt(calc.fv10) + " of future wealth over 10 years and " + calc.months.toFixed(1) + " months of your surplus. rule against that number." });
    }
    setBusy(false);
  };
  const vc = out ? (out.verdict === "ACQUIRE" ? "var(--ok)" : out.verdict === "NOT WORTH IT" ? "var(--acc2)" : "var(--warn)") : "var(--txt)";
  return (
    <div className="fade" style={{ padding: "4px 16px 20px" }}>
      <SectionLabel n="⚖" t="PURCHASE TRIBUNAL" />
      <div className="card" style={{ padding: 14 }}>
        <Ticks />
        <div className="lbl">BRING THE ACCOUNTANT A PURCHASE</div>
        <div style={{ marginTop: 10 }}><input className="in" placeholder="what do you want? (e.g. Rolex Submariner)" value={item.name} onChange={e => setItem({ ...item, name: e.target.value })} /></div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 8 }}>
          <input className="in" type="number" inputMode="decimal" placeholder="cost $" value={item.cost} onChange={e => setItem({ ...item, cost: e.target.value })} />
          <select className="in sel" value={item.kind} onChange={e => setItem({ ...item, kind: e.target.value })}><option>Depreciating</option><option>Appreciating</option><option>Income-producing</option><option>Pure utility</option></select>
        </div>
        <button className="btn" style={{ marginTop: 12 }} onClick={run}>{busy ? "RULING…" : "⚖ RUN THE NUMBERS"}</button>
      </div>
      {calc.cost > 0 && <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 8 }}>
        <Stat k="TRUE COST / 10Y" v={fmt(calc.fv10)} color="var(--acc)" sub="if invested instead" />
        <Stat k="TRUE COST / 20Y" v={fmt(calc.fv20)} color="var(--acc)" sub="opportunity cost" />
        <Stat k="MONTHS OF SURPLUS" v={calc.months.toFixed(1)} sub="of your DCA" />
        <Stat k="STICKER" v={fmt(calc.cost)} sub={item.kind.toLowerCase()} />
      </div>}
      {out && <div className="card" style={{ padding: 16, marginTop: 8 }}>
        <Ticks />
        <div className="row"><div className="lbl">THE RULING</div><Scale size={13} color="var(--acc)" /></div>
        <div className="big" style={{ fontSize: 26, marginTop: 8, color: vc }}>{out.verdict}</div>
        <div style={{ fontSize: 12.5, lineHeight: 1.55, marginTop: 10, whiteSpace: "pre-wrap" }}>{busy ? "// computing the cost of wanting…" : out.body}</div>
      </div>}
      <div style={{ fontSize: 10.5, color: "var(--faint)", marginTop: 14, lineHeight: 1.6 }}>// the tribunal weighs opportunity cost, not your worth. utility can justify a no-ROI buy and it will say so. it will never bless eating your safety floor. analysis, not financial advice.</div>
    </div>
  );
}

/* ============================ FORTRESS: SAFE-TO-SPEND + DEBT ============================ */
function FortressView({ D, settings }) {
  const [flow, setFlow] = useState({ income: "", birthDay: 15, floor: "" });
  const [bills, setBills] = useState([]);
  const [debts, setDebts] = useState([]);
  const [ready, setReady] = useState(false);
  const [bf, setBf] = useState({});
  const [df, setDf] = useState({});
  const [extra, setExtra] = useState("");
  const [method, setMethod] = useState("avalanche");

  useEffect(() => { (async () => {
    setFlow(await store.get("bd_flow", { income: "", birthDay: 15, floor: "" }));
    setBills(await store.get("bd_bills", []));
    setDebts(await store.get("bd_debts", []));
    setReady(true);
  })(); }, []);
  useEffect(() => { if (ready) store.set("bd_flow", flow); }, [flow, ready]);
  useEffect(() => { if (ready) store.set("bd_bills", bills); }, [bills, ready]);
  useEffect(() => { if (ready) store.set("bd_debts", debts); }, [debts, ready]);

  const nthWed = (y, m, nth) => {
    const d = new Date(y, m, 1); let count = 0;
    while (count < 60) { if (d.getDay() === 3) { count++; if (count === nth) return new Date(d); } d.setDate(d.getDate() + 1); }
    return new Date(y, m, 15);
  };
  const depositInfo = useMemo(() => {
    const bd = +flow.birthDay || 15;
    const nth = bd <= 10 ? 2 : bd <= 20 ? 3 : 4;
    const now = new Date(); now.setHours(0, 0, 0, 0);
    let dep = nthWed(now.getFullYear(), now.getMonth(), nth);
    if (dep < now) dep = nthWed(now.getFullYear(), now.getMonth() + 1, nth);
    return { dep, days: Math.ceil((dep - now) / 864e5), nth };
  }, [flow.birthDay]);

  const billCalc = useMemo(() => {
    const now = new Date(); now.setHours(0, 0, 0, 0);
    const dep = depositInfo.dep; let dueSoon = 0;
    bills.forEach(b => {
      const amt = +b.amount || 0; const day = Math.min(+b.dueDay || 1, 28);
      let due = new Date(now.getFullYear(), now.getMonth(), day);
      if (due < now) due = new Date(now.getFullYear(), now.getMonth() + 1, day);
      if (due <= dep) dueSoon += amt;
    });
    const monthlyTotal = bills.reduce((s, b) => s + (+b.amount || 0), 0);
    return { dueSoon, monthlyTotal };
  }, [bills, depositInfo]);

  const floorBuf = flow.floor !== "" ? +flow.floor : Math.round((D.avgExp || 0) * (settings.efMonths || 3));
  const cash = D.assets;
  const safe = cash - billCalc.dueSoon - floorBuf;

  const debtCalc = useMemo(() => {
    const ds = debts.map(d => ({ name: d.name || "debt", bal: +d.balance || 0, bal0: +d.balance || 0, apr: (+d.apr || 0) / 100, min: +d.minPayment || 0 })).filter(d => d.bal > 0);
    if (!ds.length) return null;
    const totalMin = ds.reduce((s, d) => s + d.min, 0);
    const budget = totalMin + (+extra || 0);
    const sim = (order) => {
      if (budget <= 0) return { months: null, interest: 0, legs: [] };
      let list = order.map(d => ({ ...d, payoff: null })); let months = 0, interest = 0;
      while (list.some(d => d.bal > 0.01) && months < 600) {
        months++; let pool = budget;
        list.forEach(d => { if (d.bal > 0.01) { const it = d.bal * d.apr / 12; d.bal += it; interest += it; } });
        list.forEach(d => { if (d.bal > 0.01) { const pay = Math.min(d.min, d.bal, pool); d.bal -= pay; pool -= pay; } });
        for (const d of list) { if (pool <= 0.01) break; if (d.bal > 0.01) { const pay = Math.min(pool, d.bal); d.bal -= pay; pool -= pay; } }
        list.forEach(d => { if (d.payoff == null && d.bal <= 0.01) d.payoff = months; });
      }
      return { months: months >= 600 ? null : months, interest, legs: list.map(d => ({ name: d.name, apr: d.apr, bal0: d.bal0, payoff: d.payoff })) };
    };
    const aval = sim([...ds].sort((a, b) => b.apr - a.apr));
    const snow = sim([...ds].sort((a, b) => a.bal - b.bal));
    return { totalBal: ds.reduce((s, d) => s + d.bal0, 0), totalMin, budget, aval, snow, plan: aval.legs };
  }, [debts, extra]);

  const monthDate = (m) => { const d = new Date(); d.setMonth(d.getMonth() + (m || 0)); return d.toLocaleDateString("en", { month: "short", year: "numeric" }); };
  const downloadPlan = () => {
    if (!debtCalc || debtCalc.aval.months == null) return;
    const dc = debtCalc; let r = "";
    r += "BEDROCK — DEBT KILL ORDER\n";
    r += "generated " + new Date().toLocaleDateString("en", { year: "numeric", month: "long", day: "numeric" }) + "\n";
    r += "================================\n\n";
    r += "TOTAL DEBT: " + fmt(dc.totalBal) + " across " + dc.plan.length + " balances\n";
    r += "MONTHLY FIREPOWER: " + fmt(dc.budget) + "/mo  (minimums " + fmt(dc.totalMin) + " + extra " + fmt(dc.budget - dc.totalMin) + ")\n";
    r += "STRATEGY: AVALANCHE — highest APR first. minimizes total interest paid.\n\n";
    r += "ATTACK SEQUENCE\n----------------\n";
    dc.plan.forEach((l, i) => { r += (i + 1) + ". " + (l.name || "debt") + "  —  " + (l.apr * 100).toFixed(1) + "% APR  —  start " + fmt(l.bal0) + "  —  cleared month " + (l.payoff || "?") + " (" + monthDate(l.payoff) + ")\n"; });
    r += "\nDEBT-FREE: month " + dc.aval.months + " (" + monthDate(dc.aval.months) + ")\n";
    r += "TOTAL INTEREST PAID (avalanche): " + fmt(dc.aval.interest) + "\n";
    if (dc.snow.interest > dc.aval.interest) r += "INTEREST SAVED vs snowball: " + fmt(dc.snow.interest - dc.aval.interest) + "\n";
    r += "\nDISCIPLINE\n----------\n";
    r += "- pay every minimum, every month, without fail.\n";
    r += "- throw every spare dollar at #1 until it is dead.\n";
    r += "- when a debt dies, roll its whole payment onto the next in line.\n";
    r += "- add no new debt. a wound you keep reopening never heals.\n\n";
    r += "planning model — verify every APR and minimum with your lender.\n";
    r += "research and education, not personalized financial advice.\n";
    downloadBlob("bedrock-debt-kill-order-" + new Date().toISOString().slice(0, 10) + ".txt", r, "text/plain");
  };
  const ord = ["", "1st", "2nd", "3rd", "4th"][depositInfo.nth] || "";

  return (
    <div className="fade" style={{ padding: "4px 16px 20px" }}>
      <SectionLabel n="⛨" t="SAFE TO SPEND" />
      <div className="card" style={{ padding: 16 }}>
        <Ticks />
        <div className="row"><div className="lbl">DISCRETIONARY — SAFE TO SPEND NOW</div><Shield size={14} color="var(--acc)" /></div>
        <div className="big" style={{ fontSize: 38, marginTop: 6, color: safe >= 0 ? "var(--ok)" : "var(--acc2)" }}>{fmt(safe)}</div>
        <div style={{ fontSize: 11.5, color: "var(--dim)", lineHeight: 1.5, marginTop: 6 }}>after {fmt(billCalc.dueSoon)} in bills due before your next deposit and a {fmt(floorBuf)} floor buffer held back. {safe < 0 ? "// below the line — hold, do not spend." : "// everything above this number is yours to move."}</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 8 }}>
        <Stat k="NEXT SSDI DEPOSIT" v={depositInfo.dep.toLocaleDateString("en", { month: "short", day: "numeric" })} color="var(--acc)" sub={depositInfo.days + " days out"} />
        <Stat k="RELIEF INCOMING" v={flow.income ? fmt(+flow.income) : "set it"} sub={"the " + ord + " wednesday"} />
        <Stat k="BILLS / MONTH" v={fmt(billCalc.monthlyTotal)} sub={bills.length + " tracked"} />
        <Stat k="CASH ON HAND" v={fmt(cash)} sub="liquid, ex-investments" />
      </div>
      <div className="card" style={{ padding: 12, marginTop: 8 }}>
        <Ticks />
        <div className="lbl">YOUR CLOCK</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 8 }}>
          <div>
            <div className="lbl" style={{ fontSize: 8 }}>INCOME (amount + freq)</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1.3fr", gap: 4 }}>
              <input className="in" type="number" inputMode="decimal" placeholder="0" value={flow.income} onChange={e => setFlow({ ...flow, income: e.target.value })} />
              <select className="in sel" value={flow.incomeFrequency || "monthly"} onChange={e => setFlow({ ...flow, incomeFrequency: e.target.value })}>
                {FREQUENCIES.map(f => <option key={f.key} value={f.key}>{f.label.split(' ')[0]}</option>)}
              </select>
            </div>
          </div>
          <div><div className="lbl" style={{ fontSize: 8 }}>BIRTH DAY</div><input className="in" type="number" inputMode="numeric" placeholder="1-31" value={flow.birthDay} onChange={e => setFlow({ ...flow, birthDay: e.target.value })} /></div>
          <div><div className="lbl" style={{ fontSize: 8 }}>FLOOR HOLD</div><input className="in" type="number" inputMode="decimal" placeholder={String(Math.round((D.avgExp || 0) * (settings.efMonths || 3)))} value={flow.floor} onChange={e => setFlow({ ...flow, floor: e.target.value })} /></div>

        <div style={{ fontSize: 9.5, color: "var(--faint)", marginTop: 8, lineHeight: 1.5 }}>// SSA pays the 2nd, 3rd, or 4th wednesday by birth date 1-10, 11-20, 21-31. holidays shift it earlier. confirm on ssa.gov. (Income freq auto-converts for calcs like main settings.)</div>

      </div>}
      {debtCalc && <div className="card" style={{ padding: 12, marginTop: 8 }}>
        <div className="row"><div className="lbl">EXTRA $/MO AT DEBT</div><div className="mono-tab" style={{ fontWeight: 700 }}>{fmt(debtCalc.budget)}/mo deployed</div></div>
        <input className="in" type="number" inputMode="decimal" placeholder="0" value={extra} onChange={e => setExtra(e.target.value)} style={{ marginTop: 8 }} />
        <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 8, lineHeight: 1.5 }}>{debtCalc.aval.months == null ? "// enter each debt minimum payment and any extra to compute the payoff clock." : debtCalc.aval.interest <= debtCalc.snow.interest ? "// the math favors AVALANCHE — it saves " + fmt(debtCalc.snow.interest - debtCalc.aval.interest) + " in interest. snowball wins on momentum if you need early kills." : "// snowball is cheaper here — rare, take it."}</div>
      </div>}
      {debtCalc && debtCalc.aval.months != null && debtCalc.plan.length > 0 && <div className="card" style={{ padding: 14, marginTop: 8 }}>
        <Ticks />
        <div className="row"><div className="lbl">KILL ORDER — ATTACK SEQUENCE</div><span className="chip lbl-acc" style={{ borderColor: "var(--acc)" }}>AVALANCHE</span></div>
        {debtCalc.plan.map((l, i) => (
          <div key={i} className="row" style={{ marginTop: 8, alignItems: "flex-start" }}>
            <div className="row" style={{ gap: 8 }}><div className="big" style={{ fontSize: 16, color: i === 0 ? "var(--acc)" : "var(--dim)" }}>{i + 1}</div><div><div style={{ fontWeight: 700, fontSize: 12.5 }}>{l.name}</div><div className="lbl" style={{ fontSize: 8.5, marginTop: 2 }}>{(l.apr * 100).toFixed(1)}% APR · {fmt(l.bal0)}</div></div></div>
            <div style={{ textAlign: "right" }}><div className="mono-tab" style={{ fontWeight: 700, fontSize: 12 }}>{l.payoff ? "mo " + l.payoff : "—"}</div><div className="lbl" style={{ fontSize: 8 }}>{l.payoff ? monthDate(l.payoff) : ""}</div></div>
          </div>
        ))}
        <div style={{ fontSize: 10.5, color: "var(--dim)", marginTop: 12, lineHeight: 1.5 }}>strike #1 first — it bleeds you fastest at {(debtCalc.plan[0].apr * 100).toFixed(1)}%. kill it, then roll its payment onto #2. debt-free by {monthDate(debtCalc.aval.months)}.</div>
        <button className="btn" style={{ marginTop: 12 }} onClick={downloadPlan}>↓ DOWNLOAD THE PLAN</button>
      </div>}
      {debts.length === 0 && <div className="card" style={{ padding: 14 }}><div style={{ fontSize: 12, color: "var(--dim)" }}>no debt logged. if you carry none, you already stand where most never will. if you do — log it, and we set the kill order.</div></div>}
      {debts.map(d => (
        <div key={d.id} className="card" style={{ padding: "10px 12px", marginTop: 6, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div><div style={{ fontWeight: 600, fontSize: 13 }}>{d.name}</div><div className="lbl" style={{ fontSize: 8.5 }}>{d.apr}% APR · MIN {fmt(+d.minPayment)}</div></div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}><div className="mono-tab" style={{ fontWeight: 700, color: "var(--acc2)" }}>{fmt(+d.balance)}</div><button className="btn-ghost" style={{ width: 28, height: 28, padding: 0, display: "grid", placeItems: "center" }} onClick={() => setDebts(debts.filter(x => x.id !== d.id))}><Trash2 size={12} /></button></div>
        </div>
      ))}
      <div className="card" style={{ padding: 12, marginTop: 6 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr 0.7fr 0.9fr", gap: 6 }}>
          <input className="in" placeholder="debt" value={df.name || ""} onChange={e => setDf({ ...df, name: e.target.value })} />
          <input className="in" type="number" inputMode="decimal" placeholder="bal $" value={df.balance || ""} onChange={e => setDf({ ...df, balance: e.target.value })} />
          <input className="in" type="number" inputMode="decimal" placeholder="APR%" value={df.apr || ""} onChange={e => setDf({ ...df, apr: e.target.value })} />
          <input className="in" type="number" inputMode="decimal" placeholder="min $" value={df.minPayment || ""} onChange={e => setDf({ ...df, minPayment: e.target.value })} />
        </div>
        <button className="btn btn-ghost" style={{ marginTop: 8 }} onClick={() => { if (!df.name || !df.balance) return; setDebts([...debts, { id: Date.now(), name: df.name, balance: df.balance, apr: df.apr || 0, minPayment: df.minPayment || 0 }]); setDf({}); }}><Plus size={13} style={{ verticalAlign: "-2px", marginRight: 6 }} />ADD DEBT</button>
      </div>
      <div style={{ fontSize: 10.5, color: "var(--faint)", marginTop: 14, lineHeight: 1.6 }}>// the floor is sacred. safe-to-spend never counts bill money or your buffer as spendable. debt math is a planning model — verify rates with your lender. analysis, not financial advice.</div>
    </div>
  );
}

/* ============================ QUANT ============================ */
function Quant({ settings, holdings, setHoldings, D }) {
  const [hz, setHz] = useState(10);
  const [goal, setGoal] = useState(1000000);
  const [sim, setSim] = useState(null);
  const [fat, setFat] = useState(true);
  const ebets = (() => { const mv = holdings.map(h => (+h.units || 0) * (+h.price || 0)); const tot = mv.reduce((a, b) => a + b, 0); if (tot <= 0) return null; return Math.exp(-mv.reduce((sm, m) => { const w = m / tot; return sm + (w > 0 ? w * Math.log(w) : 0); }, 0)); })();
  const [running, setRunning] = useState(false);
  const [sheet, setSheet] = useState(false);
  const [f, setF] = useState({});
  const [syncing, setSyncing] = useState(false);
  const [syncNote, setSyncNote] = useState("");
  const syncPrices = async () => {
    if (!holdings.length || syncing) return;
    setSyncing(true); setSyncNote("");
    let hit = 0, miss = 0;
    try {
      const updated = await Promise.all(holdings.map(async (h) => {
        const t = (h.ticker || "").toUpperCase();
        if (!t) return h;
        try {
          const r = await fetch("https://api.coinbase.com/v2/prices/" + t + "-USD/spot");
          if (!r.ok) { miss++; return h; }
          const j = await r.json();
          const px = j && j.data && +j.data.amount;
          if (px) { hit++; return { ...h, price: px }; }
          miss++; return h;
        } catch (e) { miss++; return h; }
      }));
      setHoldings(updated);
      setSyncNote(hit + " priced live from Coinbase" + (miss ? " · " + miss + " not on the crypto feed (stocks/ETFs — enter price manually, or connect a read-only source)" : ""));
    } catch (e) { setSyncNote("could not reach the Coinbase price feed — prices unchanged."); }
    setSyncing(false);
  };
  const [imgBusy, setImgBusy] = useState(false);
  const [imgPrev, setImgPrev] = useState(null);
  const [imgMsg, setImgMsg] = useState("");
  const importImg = async (file) => {
    if (!file) return;
    setImgBusy(true); setImgPrev(null); setImgMsg("reading image…");
    try {
      const dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
      setImgMsg("extracting positions with your model…");
      const out = await callLLM(
        "You are a precise data-extraction engine. Output only valid JSON and nothing else.",
        [{ role: "user", content: [
          { type: "text", text: "Extract every investment position visible in this statement or screenshot. Return ONLY a JSON array. Each element has keys ticker (uppercase symbol string), units (number of units held), cost (average cost per unit, or 0 if not shown), price (current price per unit, or 0 if not shown). If no positions are visible, return an empty array. No prose, no markdown, no code fences." },
          { type: "image_url", image_url: { url: dataUrl } }
        ] }],
        1500
      );
      if (out && out.indexOf("//") === 0) { setImgMsg(out); setImgBusy(false); return; }
      const m = out.match(/\[[\s\S]*\]/);
      if (!m) { setImgMsg("// could not read positions from that image. try a tighter crop, or set a vision-capable model in Config."); setImgBusy(false); return; }
      const arr = JSON.parse(m[0]).filter(x => x && x.ticker).map(x => ({ id: Date.now() + Math.floor(Math.random() * 1e6), ticker: String(x.ticker).toUpperCase(), units: +x.units || 0, cost: +x.cost || 0, price: +x.price || 0 }));
      if (!arr.length) { setImgMsg("// no positions found in that image."); setImgBusy(false); return; }
      setImgPrev(arr); setImgMsg(arr.length + " positions read — review, then confirm.");
    } catch (e) { setImgMsg("// import failed. nothing changed."); }
    setImgBusy(false);
  };
  const confirmImg = () => { if (imgPrev) { const n = imgPrev.length; setHoldings([...holdings, ...imgPrev]); setImgPrev(null); setImgMsg(n + " positions added."); } };
  const run = () => {
    setRunning(true);
    setTimeout(() => {
      const P0 = D.P0 + D.invMv;
      const contrib = (D.effContrib != null ? D.effContrib : settings.contribution);
      setSim(monteCarlo(P0, contrib, settings.ret, settings.vol, hz * 12, 400, goal, fat ? 4 : 0));
      setRunning(false);
    }, 30);
  };
  useEffect(() => { run(); /* eslint-disable-next-line */ }, []);
  const alloc = holdings.map((h, i) => ({ name: h.ticker || ("H" + i), v: (+h.units || 0) * (+h.price || 0) })).filter(x => x.v > 0);
  const COL = ["#FF4D14", "#46E0A0", "#FFB000", "#3A86FF", "#FF2D2D", "#8C8C8C"];
  const saveH = () => { if (!f.ticker) return; setHoldings([...holdings, { id: Date.now(), ticker: f.ticker.toUpperCase(), units: +f.units || 0, cost: +f.cost || 0, price: +f.price || 0 }]); setSheet(false); };
  return (
    <div className="fade" style={{ padding: "4px 16px 20px" }}>
      <SectionLabel n="∑" t="MONTE CARLO ENGINE" />
      <div className="card" style={{ padding: 14 }}>
        <Ticks />
        <div className="lbl">GBM SIMULATION · 400 PATHS · CONTRIB {fmt(settings.contribution)}/MO</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 10 }}>
          <div><div className="lbl" style={{ fontSize: 8, marginBottom: 4 }}>HORIZON (YRS)</div><input className="in" style={{ padding: "8px 9px" }} type="number" value={hz} onChange={e => setHz(Math.max(1, Math.min(40, +e.target.value || 10)))} /></div>
          <div><div className="lbl" style={{ fontSize: 8, marginBottom: 4 }}>GOAL $</div><input className="in" style={{ padding: "8px 9px" }} type="number" value={goal} onChange={e => setGoal(+e.target.value || 0)} /></div>
        </div>
        <div className="lbl" style={{ marginTop: 10 }}>μ {(settings.ret * 100).toFixed(0)}%/yr · σ {(settings.vol * 100).toFixed(0)}%/yr · start {fmtk(D.P0 + D.invMv)}</div>
        <div className="row" style={{ gap: 8, marginTop: 12 }}>
          <button className="btn" style={{ flex: 1 }} onClick={run}>{running ? "COMPUTING…" : "▶ RUN (CLIENT)"}</button>
        </div>
        <div className="lbl" style={{ color: "var(--faint)", marginTop: 6 }}>monte carlo runs on-device — server forge retired (sovereign mode)</div>
      </div>

      {sim && <>
        <div className="card" style={{ padding: "14px 6px 6px", marginTop: 8 }}>
          <Ticks />
          <div className="lbl" style={{ paddingLeft: 8 }}>WEALTH FAN — P5 / P50 / P95</div>
          <FanChart data={sim.fan} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 8 }}>
          <Stat k={"MEDIAN @ " + hz + "Y"} v={fmtk(sim.p50)} color="var(--acc)" />
          <Stat k="MEAN" v={fmtk(sim.mean)} />
          <Stat k="P5 (UNLUCKY)" v={fmtk(sim.p5)} color="var(--warn)" />
          <Stat k="P95 (LUCKY)" v={fmtk(sim.p95)} color="var(--ok)" />
        </div>
        <div className="card" style={{ padding: 16, marginTop: 8 }}>
          <Ticks />
          <div className="lbl">PROB. OF HITTING {fmtk(goal)}</div>
          <div className="big mono-tab" style={{ fontSize: 40, marginTop: 6, color: sim.prob >= .5 ? "var(--ok)" : sim.prob >= .2 ? "var(--warn)" : "var(--acc2)" }}>{sim.prob != null ? (sim.prob * 100).toFixed(0) + "%" : "—"}</div>
          <div style={{ height: 8, background: "var(--bg)", border: "1px solid var(--line)", marginTop: 10 }}><div style={{ height: "100%", width: (sim.prob * 100) + "%", background: sim.prob >= .5 ? "var(--ok)" : "var(--acc)" }} /></div>
        </div>
        <SectionLabel n="☠" t="TAIL RISK & RUIN" />
        <div className="card" style={{ padding: 16 }}>
          <Ticks />
          <div className="row"><div className="lbl">PROBABILITY OF A DRAWDOWN THIS DEEP</div><button className="chip" onClick={() => { const nf = !fat; setFat(nf); setSim(monteCarlo(P0, settings.contribution, settings.ret, settings.vol, hz * 12, 400, goal, nf ? 4 : 0)); }} style={{ cursor: "pointer", borderColor: "var(--acc)", color: "var(--acc)" }}>{fat ? "FAT-TAIL t" : "NORMAL"}</button></div>
          {[["≥ 50%", sim.dd50, "var(--warn)"], ["≥ 70%", sim.dd70, "var(--acc)"], ["≥ 90% — ruin", sim.dd90, "var(--acc2)"]].map(([lab, v, col]) => (
            <div key={lab} style={{ marginTop: 10 }}>
              <div className="row"><div className="lbl" style={{ fontSize: 9.5 }}>{lab}</div><div className="mono-tab" style={{ fontWeight: 700, color: col }}>{(v * 100).toFixed(1)}%</div></div>
              <div style={{ height: 6, background: "var(--bg)", border: "1px solid var(--line)", marginTop: 4 }}><div style={{ height: "100%", width: (v * 100) + "%", background: col }} /></div>
            </div>
          ))}
          <div style={{ fontSize: 10, color: "var(--faint)", marginTop: 12, lineHeight: 1.5 }}>// shocks drawn from a Student-t, df {sim.df || "normal"}, so crashes are modeled rather than wished away. survival is the first objective; everything else is secondary.</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 8 }}>
          <Stat k="MEDIAN MAX DRAWDOWN" v={(sim.medMDD * 100).toFixed(0) + "%"} color="var(--warn)" sub="typical worst dip" />
          <Stat k="P95 MAX DRAWDOWN" v={(sim.p95MDD * 100).toFixed(0) + "%"} color="var(--acc2)" sub="unlucky worst dip" />
          <Stat k="TIME UNDERWATER" v={(sim.medUW * 100).toFixed(0) + "%"} sub="of horizon below peak" />
          <Stat k="PAYOFF ASYMMETRY" v={sim.asym != null ? sim.asym.toFixed(2) + "x" : "—"} color={sim.asym >= 1 ? "var(--ok)" : "var(--dim)"} sub="upside vs downside" />
        </div>
        {ebets != null && <div style={{ marginTop: 8 }}>
          <Stat k="EFFECTIVE BETS · ENTROPY" v={ebets.toFixed(2)} color="var(--acc)" sub={"of " + holdings.length + " holdings — true diversification, not raw count"} />
        </div>}
      </>}

      <SectionLabel n="₿" t="BTC CYCLE" />
      <BTCGauge />
      <SectionLabel n="◔" t="PORTFOLIO ALLOCATION" />
      {alloc.length > 0 ? (
        <div className="card" style={{ padding: 14, display: "flex", alignItems: "center", gap: 14 }}>
          <Ticks />
          <Donut data={alloc} colors={COL} />
          <div style={{ flex: 1 }}>
            {alloc.map((a, i) => (
              <div key={i} className="row" style={{ marginBottom: 6 }}>
                <div className="lbl row" style={{ gap: 6, color: "var(--txt)" }}><span style={{ width: 8, height: 8, background: COL[i % COL.length] }} />{a.name}</div>
                <div className="mono-tab" style={{ fontSize: 11, color: "var(--dim)" }}>{fmtk(a.v)}</div>
              </div>
            ))}
          </div>
        </div>
      ) : <Empty t="EMPTY ARSENAL" s="log a position to see allocation and P/L." />}
      {holdings.map(h => (
        <div key={h.id} className="card" style={{ padding: "11px 14px", marginTop: 8 }}>
          <Ticks />
          <div className="row">
            <div><div style={{ fontWeight: 800, fontSize: 13 }}>{h.ticker}</div><div className="lbl" style={{ marginTop: 3 }}>{h.units} @ {fmt(h.price)}</div></div>
            <div className="row" style={{ gap: 10 }}>
              <div style={{ textAlign: "right" }}><div className="mono-tab" style={{ fontWeight: 800, fontSize: 14 }}>{fmt(h.units * h.price)}</div><div className="lbl" style={{ color: (h.price - h.cost) >= 0 ? "var(--ok)" : "var(--acc2)" }}>{((h.cost ? (h.price / h.cost - 1) : 0) * 100).toFixed(1)}%</div></div>
              <button className="btn-ghost" style={{ width: 28, height: 28, padding: 0, display: "grid", placeItems: "center" }} onClick={() => setHoldings(holdings.filter(x => x.id !== h.id))}><Trash2 size={12} /></button>
            </div>
          </div>
        </div>
      ))}
      {holdings.length > 0 && <button className="btn" style={{ marginTop: 12 }} onClick={syncPrices}>{syncing ? "SYNCING LIVE…" : "⟳ SYNC LIVE PRICES"}</button>}
      {syncNote && <div style={{ fontSize: 10, color: "var(--dim)", marginTop: 6, lineHeight: 1.5 }}>{"// " + syncNote}</div>}
      <button className="btn btn-ghost" style={{ marginTop: 8 }} onClick={() => { setF({}); setSheet(true); }}><Plus size={13} style={{ verticalAlign: "-2px", marginRight: 6 }} />ADD HOLDING</button>
      <label className="btn btn-ghost" style={{ marginTop: 8, cursor: "pointer", display: "grid", placeItems: "center" }}><Sparkles size={12} style={{ verticalAlign: "-2px", marginRight: 6 }} />{imgBusy ? "READING IMAGE…" : "IMPORT FROM IMAGE (AI)"}<input type="file" accept="image/*" onChange={e => importImg(e.target.files && e.target.files[0])} style={{ display: "none" }} /></label>
      {imgMsg && <div style={{ fontSize: 10, color: "var(--dim)", marginTop: 6, lineHeight: 1.5 }}>{imgMsg}</div>}
      {imgPrev && <div className="card" style={{ padding: 12, marginTop: 8 }}>
        <Ticks />
        <div className="lbl">EXTRACTED — REVIEW BEFORE ADDING</div>
        {imgPrev.map((h, i) => <div key={i} className="row" style={{ marginTop: 6 }}><div style={{ fontWeight: 700, fontSize: 12 }}>{h.ticker}</div><div className="lbl mono-tab">{h.units} @ {fmt(h.price)} · cost {fmt(h.cost)}</div></div>)}
        <div className="row" style={{ gap: 8, marginTop: 10 }}><button className="btn" onClick={confirmImg}>CONFIRM IMPORT</button><button className="btn btn-ghost" onClick={() => { setImgPrev(null); setImgMsg(""); }}>DISCARD</button></div>
      </div>}
      <div style={{ fontSize: 10.5, color: "var(--faint)", marginTop: 14, lineHeight: 1.6 }}>// monte carlo = geometric brownian motion, reseeds each run — a planning model, not a prediction. SYNC pulls live crypto prices from Coinbase public feed: no key, nothing leaves the app. stocks/ETFs need a price entered or a connected read-only source. not financial advice.</div>

      {sheet && <Sheet title="ADD HOLDING" onClose={() => setSheet(false)}>
        <Field label="Ticker"><input className="in" placeholder="BTC / VTI" onChange={e => setF({ ...f, ticker: e.target.value })} /></Field>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <Field label="Units"><input className="in" type="number" inputMode="decimal" onChange={e => setF({ ...f, units: e.target.value })} /></Field>
          <Field label="Avg cost $"><input className="in" type="number" inputMode="decimal" onChange={e => setF({ ...f, cost: e.target.value })} /></Field>
        </div>
        <Field label="Current price $"><input className="in" type="number" inputMode="decimal" onChange={e => setF({ ...f, price: e.target.value })} /></Field>
        <button className="btn" onClick={saveH}>SAVE</button>
      </Sheet>}
    </div>
  );
}

/* ============================ COACH (AI) ============================ */
function Coach({ D, rank, settings, goals }) {
  const [msgs, setMsgs] = useState([{ role: "ai", text: "// the dojo is open. i read your numbers, not your hopes. ask what is true — am i on track, what is my real risk, how fast can i reach the jet. i will not flatter you. i will sharpen you." }]);
  const reg = regimeOf(D, settings);
  const persona = reg.persona;
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [mode, setMode] = useState("chat");
  const endRef = useRef(null);
  useEffect(() => { endRef.current && endRef.current.scrollIntoView({ behavior: "smooth" }); }, [msgs, busy]);
  const chips = ["Am I on track?", "How do I reach the jet faster?", "Explain my risk", "Is $1M in 5 years realistic?"];

  // === Hermes-style agent swarm support (Phase 1+) ===
  // Multiple agents (personas) can analyze the same snapshot in parallel.
  // They can "call" local tools (monte carlo variants, portfolio suggestions) via structured output the UI can act on.
  const [swarmResults, setSwarmResults] = useState<any[]>([]);
  const swarmPersonas = ["STRATEGIST", "WICK", "ACCOUNTANT", "BEEKEEPER"];

  const runSwarm = async () => {
    setBusy(true);
    setSwarmResults([]);
    const snapshot = `Net worth: ${fmt(D.nw)}; Cash: ${fmt(D.assets)}; Investments: ${fmt(D.invMv)}; Monthly DCA: ${fmt(settings.contribution)}; Return/vol: ${(settings.ret*100).toFixed(0)}% / ${(settings.vol*100).toFixed(0)}%`;

    const results: any[] = [];
    for (const p of swarmPersonas) {
      const sys = `You are a ${p} agent in a BEDROCK quantitative portfolio engineering swarm. Be concise, structured, use JSON if suggesting numbers. Snapshot: ${snapshot}. Focus on analysis, risk, allocation ideas, or specific actions.`;
      try {
        const out = await callLLM(sys, [{ role: "user", content: "Give your view and any actionable portfolio engineering suggestions." }], 700);
        results.push({ persona: p, text: out });
      } catch (e) {
        results.push({ persona: p, text: "// agent failed to respond" });
      }
    }
    setSwarmResults(results);
    setBusy(false);
  };

  const send = async (textArg) => {
    const text = (textArg || input).trim(); if (!text || busy) return;
    const next = [...msgs, { role: "me", text }]; setMsgs(next); setInput(""); setBusy(true);
    const ctx = `User snapshot — Net worth: ${fmt(D.nw)}; Cash: ${fmt(D.assets)}; Investments: ${fmt(D.invMv)}; Liabilities: ${fmt(D.liab)}; Monthly contribution (DCA): ${fmt(settings.contribution)}; Starting investable: ${fmt(settings.capital)}; Expected return assumption: ${(settings.ret * 100).toFixed(0)}%/yr; Volatility: ${(settings.vol * 100).toFixed(0)}%/yr; Rank: ${rank.name} (Lv ${rank.lvl}); EF runway: ${D.runway != null ? D.runway.toFixed(1) + " months" : "unknown"}. Goals: ${goals.map(g => g.name + " $" + g.cost + " by " + g.year).join("; ")}.`;
    const system = `You are ${PERSONAS[persona].tag}, the AI advisor inside a personal-finance app called BEDROCK. ${reg.directive} Voice: ${PERSONAS[persona].voice} Be hard on the math and the choices, never contemptuous of the person. Stay in character, keep it brief, no emojis. You are RIGOROUS and HONEST above all: never promise get-rich-quick, never recommend specific securities or guarantee returns, and gently reality-check fantasies with real math (e.g. $1M in 5y from a small base needs ~90%/yr which no one sustains; long-run stocks ~10%/yr; the path that could spike that high also goes to zero). Champion bounded aggression: maximize growth of money he can afford to risk, protect the floor (emergency fund / bill money) absolutely, and lean on owning productive assets + raising income. Be encouraging about what IS achievable (the Teslas and even the jet are reachable on a disciplined clock). Keep replies under ~130 words, concrete, and tied to his actual numbers. Discourage leverage, margin, and borrowing against volatile assets at his level — it is the fastest path to ruin in the very crashes he wants to survive. On taxes and legal structures give general education only, always defer to a licensed CPA and attorney, and never help conceal assets or evade tax — privacy is legal, evasion is prison. End anything investment-related with a brief reminder this is not financial advice. ${ctx}`;
    try {
      const hist = next.filter(m => m.role !== "ai" || m !== next[0]).map(m => ({ role: m.role === "me" ? "user" : "assistant", content: m.text }));
      const out = await callLLM(system, hist.length ? hist : [{ role: "user", content: text }], 1000);
      setMsgs([...next, { role: "ai", text: out || "// signal lost. try again." }]);
    } catch (e) {
      setMsgs([...next, { role: "ai", text: "// can't reach the network right now. but the math doesn't change: protect the floor, fund what's reachable, raise income. run it back when you're connected." }]);
    }
    setBusy(false);
  };

  return (
    <div className="fade" style={{ padding: "4px 16px 20px", display: "flex", flexDirection: "column", height: "calc(100vh - 220px)" }}>
      <div className="card" style={{ padding: 12, marginTop: 6 }}>
        <Ticks />
        <div className="row"><div className="row" style={{ gap: 8 }}><Cpu size={15} color="var(--acc)" /><div className="big" style={{ fontSize: 18 }}>{PERSONAS[persona].tag}</div></div><span className="chip lbl-acc" style={{ borderColor: "var(--acc)" }}>AI</span></div>
        <div style={{ marginTop: 10, fontSize: 10.5, color: "var(--dim)", lineHeight: 1.5 }}><span className="lbl" style={{ color: "var(--acc)" }}>AUTO-CALIBRATED · {reg.stage}</span> — {reg.posture}</div>
      </div>
      <div className="row" style={{ gap: 8, marginTop: 8 }}>
        <button className={mode === "chat" ? "btn" : "btn btn-ghost"} onClick={() => setMode("chat")}>STRATEGIST</button>
        <button className={mode === "codex" ? "btn" : "btn btn-ghost"} onClick={() => setMode("codex")}>CODEX</button>
        <button className={mode === "swarm" ? "btn" : "btn btn-ghost"} onClick={() => setMode("swarm")}>SWARM</button>
      </div>

      {mode === "swarm" && (
        <div style={{ marginTop: 10 }}>
          <div className="card" style={{ padding: 12 }}>
            <Ticks />
            <div className="lbl">HERMES-STYLE AGENT SWARM — QUANT PORTFOLIO ENGINEERING</div>
            <div style={{ fontSize: 11, color: "var(--dim)", marginTop: 6 }}>Multiple specialized agents analyze your current snapshot in parallel and produce structured ideas you can act on (allocations, risk sizing, MC scenarios).</div>
            <button className="btn" style={{ marginTop: 10 }} onClick={runSwarm} disabled={busy}>{busy ? "RUNNING SWARM..." : "RUN SWARM (4 agents)"}</button>
          </div>

          {swarmResults.length > 0 && swarmResults.map((r, i) => (
            <div key={i} className="card" style={{ padding: 12, marginTop: 8 }}>
              <div className="lbl" style={{ color: "var(--acc)" }}>{r.persona}</div>
              <div style={{ fontSize: 12.5, marginTop: 6, whiteSpace: "pre-wrap" }}>{r.text}</div>
            </div>
          ))}
          <div style={{ fontSize: 10, color: "var(--faint)", marginTop: 8 }}>Agents use your live local numbers + the same LLM providers as the single Coach. Add custom agents and tool-calling (run MC, optimize) in later iterations.</div>
        </div>
      )}

      {mode === "codex" && <CodexView />}
      {mode === "chat" && <><div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, padding: "14px 2px" }}>
        {msgs.map((m, i) => <div key={i} className={"bubble " + (m.role === "me" ? "me" : "ai")}>{m.text}</div>)}
        {busy && <div className="bubble ai"><span className="lbl">thinking</span><span className="rec" style={{ display: "inline-block", marginLeft: 6 }} /></div>}
        <div ref={endRef} />
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
        {chips.map(c => <button key={c} className="chip" style={{ cursor: "pointer", padding: "6px 9px" }} onClick={() => send(c)}>{c}</button>)}
      </div>
      <div className="row" style={{ gap: 8 }}>
        <input className="in" placeholder="ask the strategist…" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} />
        <button className="btn" style={{ width: 52 }} onClick={() => send()}><Send size={15} /></button>
      </div></>}
    </div>
  );
}

function LiveMarketView({ cloud }) {
  const [symbols, setSymbols] = useState("BTC,ETH,SOL,AVAX");

  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(false);
  const [note, setNote] = useState("");

  // Alt comps state (data layer continuation — for watches/cards/spirits etc. preview + future vault integration)
  const [altCat, setAltCat] = useState("Watch");
  const [altRef, setAltRef] = useState("126610LN");
  const [altComps, setAltComps] = useState(null);

  const backend = (cloud && cloud.url) || "http://localhost:8787";

  const fetchQuotes = async () => {
    setLoading(true);
    const syms = symbols.split(",").map(s => s.trim()).filter(Boolean);
    const results: any[] = [];
    for (const s of syms) {
      try {
        const r = await fetch(`${backend.replace(/\/$/, "")}/v1/market/quote/${encodeURIComponent(s)}`);
        if (r.ok) results.push(await r.json());
      } catch (e) {}
    }
    setQuotes(results);
    setLoading(false);
  };

  const fetchNews = async () => {
    try {
      const r = await fetch(`${backend.replace(/\/$/, "")}/v1/market/news?q=macro+crypto+finance`);
      if (r.ok) {
        const j = await r.json();
        setNews(j.items || []);
        setNote(j.note || "");
      }
    } catch (e) {}
  };

  const addToHoldings = (q: any) => {
    // Placeholder: in a full version this would open the Add Holding sheet prefilled
    // or directly mutate holdings if we had the setter in scope.
    alert(`Would add ${q.symbol || q.id} @ $${q.price} to local holdings (wire to Quant/Ledger in next iteration).`);

  return (
    <div className="fade" style={{ padding: "4px 16px 20px" }}>

        </div>
        <div style={{ fontSize: 10, color: "var(--faint)", marginTop: 6 }}>Backend: {backend} — real-time data feeds the agents and your local models.</div>
      </div>

      {quotes.length > 0 && (
        <div className="card" style={{ padding: 12, marginTop: 10 }}>
          <Ticks />
          <div className="lbl">QUOTES</div>
          {quotes.map((q, i) => (
            <div key={i} className="row" style={{ marginTop: 8, padding: "6px 0", borderBottom: "1px solid var(--line)" }}>
              <div>
                <span style={{ fontWeight: 700 }}>{q.symbol || q.id}</span>

              </div>
              <div className="row" style={{ gap: 10 }}>

      {news.length > 0 && (
        <div className="card" style={{ padding: 12, marginTop: 10 }}>
          <Ticks />
          <div className="lbl">NEWS / INTEL (stub — Ground News, IntoTheCryptoverse style)</div>
